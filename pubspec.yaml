name: food_catering_admin
description: Food Catering Admin Management System - Complete offline management solution.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Local Storage
  path_provider: ^2.1.2
  shared_preferences: ^2.2.3

  # UI
  fl_chart: ^0.68.0
  intl: ^0.19.0
  uuid: ^4.4.0

  # PDF Export
  pdf: ^3.11.0
  printing: ^5.12.0

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/
